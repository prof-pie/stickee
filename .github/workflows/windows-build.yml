name: Windows build check

# Smoke-test: verifies the app compiles on Windows after every push/PR.
# npm-only (no bun). No release creation on non-tag pushes.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  # 1) Fastest signal: frontend builds
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  # 2) Windows: make sure Tauri desktop still compiles
  tauri-windows:
    needs: frontend
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      # Icons are referenced by tauri.conf.json but are gitignored in src-tauri/.gitignore.
      # Generate them from the repo logo so the Tauri resource build doesn't fail with
      # `icons/icon.ico not found`.
      - name: Install frontend deps (needed for tauri CLI)
        run: npm ci

      - name: Generate icons from public/stickee.png
        run: npx tauri icon public/stickee.png

      - name: Lint frontend
        run: npm run lint

      - name: Frontend build
        run: npm run build

      # For push/PR smoke test: just check the crate + bundle without creating a GitHub release.
      # --no-bundle avoids building installer packages per PR (faster); the Tauri action still
      # runs `cargo build` + `tauri build --no-bundle`.
      - name: Tauri build (no installer, check-only)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --no-bundle

  # 3) Optional: full release only on semver tags (v*). Produces artifacts + draft release.
  tauri-windows-release:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install frontend deps
        run: npm ci

      - name: Generate icons
        run: npx tauri icon public/stickee.png

      - name: Tauri build + (draft) release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Stickee v__VERSION__"
          releaseBody: "See assets below."
          releaseDraft: true
          prerelease: false
