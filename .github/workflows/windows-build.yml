name: Windows build check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - run: npm ci

      # Frontend build (Vite/React)
      - run: npm run build

      # Desktop app compile (Tauri) — --no-bundle = compile-check only, no installer
      - name: Tauri build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --no-bundle
