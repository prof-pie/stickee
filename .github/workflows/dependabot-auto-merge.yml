name: Dependabot auto-merge

# Dependabot auto-merge after verification.
# Intent: user asked "dependabot after every push" — Dependabot pushes are pushes too.
# We listen to pull_request (so fetch-metadata has a PR context and pr-number
# is reliably populated) and also to push guarded by github.actor == 'dependabot[bot]'.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (npm, strict — no fallback)
        run: npm ci

      - name: Build
        run: npm run build

      - name: Auto-merge minor/patch only
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-minor' || steps.meta.outputs.update-type == 'version-update:semver-patch' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "Dependency:   ${{ steps.meta.outputs.dependency-names }}"
          echo "Update type:  ${{ steps.meta.outputs.update-type }}"
          echo "PR number:    ${{ steps.meta.outputs.previous-version }} -> ${{ steps.meta.outputs.new-version }}"
          PR="${{ steps.meta.outputs.pr-number }}"
          if [ -z "$PR" ]; then
            echo "::warning::No PR number from metadata; trying to find PR for branch ${{ github.ref_name }}"
            PR=$(gh pr list --author "app/dependabot" --json number,headRefName --limit 100 --jq ".[] | select(.headRefName==\"${{ github.ref_name }}\") | .number" | head -n1)
          fi
          if [ -z "$PR" ]; then
            echo "::warning::Could not determine PR number — aborting auto-merge"
            exit 0
          fi
          echo "Enabling auto-merge on PR #$PR"
          gh pr merge --auto --squash "$PR"
