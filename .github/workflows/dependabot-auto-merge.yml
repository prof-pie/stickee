name: Dependabot auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dependabot/fetch-metadata@v2
        id: meta
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npm ci
      - run: npm run build
      - if: ${{ steps.meta.outputs.update-type == 'version-update:semver-minor' || steps.meta.outputs.update-type == 'version-update:semver-patch' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.meta.outputs.pr-number }}"
          [ -z "$PR" ] && PR=$(gh pr list --author "app/dependabot" --json number,headRefName --jq ".[]|select(.headRefName==\"${{ github.ref_name }}\")|.number" | head -n1)
          [ -z "$PR" ] && exit 0
          gh pr merge --auto --squash "$PR"
